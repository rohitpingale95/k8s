apiVersion: v1
kind: Pod
metadata:
  name: my-pod
  labels:
    app: myapp
spec:
  volumes:
  - name: my-vol
    persistentVolumeClaim:
      claimName: my-pvc
  containers:    
  - name: nginx-container
    image: nginx:latest
    ports:
    - name: nginxport
      containerPort: 80
    volumeMounts:
    - name: my-vol
      mountPath: /usr/share/nginx/html/      