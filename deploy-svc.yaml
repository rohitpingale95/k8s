apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-deploy
  labels:
    app: my-app
  spec:
    replicas: 5
    selector:
      matchLabels:
        app: myapp
    startegy:
      type: RollingUpdate
      rollingUpdate:
        maxSurge: 1
        maxunavaialable: 1
    template:
      metadata:
        name: my-template
        labels:
          app: myapp
      spec:
        containers:
          - name: nginx-container
            image: nginx:latest
            Ports:
              name: nginxport
              containerPort: 80
...
---
apiVersion: v1
kind: Service
metadata:
  name: deploy-svc
  labels:
    app: myapp
spec:
  type: NodePort
  selector: 
    app: myapp
  ports:
    name: nginxsvcport
    port: 80
    targetPort: 80
...    


