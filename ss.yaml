apiVersion: apps/v1
kind: StatefullSet
metadata:
  name: mysql
  labels:
    app: myapp
  spec:
    replicas: 3
    selector:
      matchLabels:
        app: myapp
    template:
      metadata:
        name: mysql-template
        labels:
          app: myapp
      spec:
        containers:
        - name: mysql-container
          image: mysql.8.0
          ports:
          - name: mysql-port
            containerPort: 3306
          env:
          - name: MYQSL_USER
            value: admin
          - name: MYSQL_PASSWORD
            value: admin123
          - name: MYSQL_DATABASE
            value: studentapp
          - name: MYSQL_ROOT_PASSWORD
            value: root
...
---
apiVersion: v1
kind: Service
metadata:
  name: mysql-svc
  labels:
    app: myapp
  spec:
    clusterIP: None
    selector:
      app: myapp
    ports:
    - name: myport
      protocol: TCP
      port: 3306
      targetPort: 3306
