apiVersion: v1
kind: Deployment
metadata:
  name: my-deployment
  labels:
    app: myapp
  namespace: hpa  
spec:
  replicas: 1
  selector:
    matchLabels:
      app: myapp
  template:
    metadata:
      name: my-template
    labels:
      app: myapp
  spec:
    containers:
    - name: nginx-container
      image: nginx:latest
      ports:
      - name: myport
        containerPort: 80
